services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  yuyashi-app:
    build: ./app
    container_name: yuyashi-web-soc
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app  
      - ./id_ed25519:/app/id_ed25519:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama